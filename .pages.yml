media:
  input: public
  output: /

content:
  - name: home
    label: Domov
    type: file
    path: src/content/home.json
    fields:
      - name: hero
        label: Hero — úvodný blok
        type: object
        fields:
          - { name: foto, label: Fotka na pozadí, type: image }
          - { name: badge, label: "Aktuálne (pásik nad nadpisom)", type: string }
          - { name: riadok1, label: "Nadpis – riadok 1", type: string }
          - { name: riadok2, label: "Nadpis – riadok 2", type: string }
          - { name: riadok3, label: "Nadpis – riadok 3 (zvýraznený)", type: string }
          - { name: text, label: Hlavný text, type: text }
          - { name: button1Label, label: "Tlačidlo 1 – text", type: string }
          - { name: button1Url, label: "Tlačidlo 1 – odkaz", type: string }
          - { name: button2Label, label: "Tlačidlo 2 – text", type: string }
          - { name: button2Url, label: "Tlačidlo 2 – odkaz", type: string }
      - name: staty
        label: Štatistiky (čísla v hero)
        type: object
        list: true
        fields:
          - { name: num, label: Číslo, type: string }
          - { name: label, label: Popis, type: string }
      - name: karta
        label: Karta — najbližšia akcia
        type: object
        fields:
          - { name: tag, label: Štítok, type: string }
          - { name: titulok, label: Nadpis, type: string }
          - { name: text, label: Text, type: text }
          - { name: datum, label: Dátum, type: string }
          - { name: miesto, label: Miesto, type: string }
          - { name: email, label: E-mail, type: string }
          - { name: buttonLabel, label: "Tlačidlo – text", type: string }
          - { name: buttonUrl, label: "Tlačidlo – odkaz", type: string }

  - name: novinky
    label: Novinky
    type: collection
    path: src/content/novinky
    format: yaml-frontmatter
    view: { fields: [titulok, datum, kategoria] }
    fields:
      - { name: titulok, label: Titulok, type: string, required: true }
      - { name: datum, label: Dátum, type: date, required: true }
      - { name: kategoria, label: Štítok, type: string }
      - { name: perex, label: Krátky popis, type: text }
      - { name: foto, label: Fotka, type: image }
      - { name: body, label: Text novinky, type: rich-text }

  - name: blog
    label: Blog
    type: collection
    path: src/content/blog
    format: yaml-frontmatter
    view: { fields: [titulok, datum, kategoria] }
    fields:
      - { name: titulok, label: Titulok, type: string, required: true }
      - { name: datum, label: Dátum, type: date, required: true }
      - { name: kategoria, label: Štítok, type: string }
      - { name: perex, label: Krátky popis, type: text }
      - { name: foto, label: Fotka, type: image }
      - { name: body, label: Text článku, type: rich-text }

  - name: kategorie
    label: Kategórie
    type: collection
    path: src/content/kategorie
    format: json
    view: { fields: [nazov, poradie, rocnik] }
    fields:
      - { name: nazov, label: Názov kategórie, type: string, required: true }
      - { name: poradie, label: Poradie v zozname, type: number }
      - { name: rocnik, label: "Ročník (napr. 2015)", type: string }
      - { name: trener, label: Tréner, type: string }
      - { name: popis, label: Popis kategórie, type: text }
      - { name: foto, label: Fotka tímu, type: image }
      - { name: aktualne, label: "Aktuálne (pre túto kategóriu)", type: text }
      - { name: futbalnetSlug, label: "FutbalNet tím (napr. u11-m-a)", type: string }
